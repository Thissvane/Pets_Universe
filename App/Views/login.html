<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pets Universe - Acceso al Sistema</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Colores extraídos del logo */
            --space-dark: #000b29;      
            --pets-blue: #1adfbe;       
            --universe-gold: #ffd700;   
            --cosmic-gradient: linear-gradient(135deg, #000b29 0%, #0a0092 100%);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #080629a9;
            margin: 0px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background-size: 25px 25px;
        }

        .login-container {
            max-width: 1000px;
            width: 100%;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            display: flex;
            box-shadow: 0 30px 60px rgba(0, 11, 41, 0.2);
           
        }

        /* LADO IZQUIERDO: Visual */
        .side-visual {
            flex: 0.8;
            background: var(--cosmic-gradient);
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            position: relative;
        }

        .side-visual img {
            width: 300px;
            z-index: 1;
            filter: drop-shadow(0 0 15px rgba(255, 215, 0, 0.3));
        }

        /* LADO DERECHO: Formulario */
        .side-form {
            flex: 1;
            padding: 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .brand-header {
            display: flex;
            align-items: center;
            margin-bottom: 25px;
        }

        .brand-header img {
            width: 40px;
            margin-right: 12px;
        }

        .brand-header h2 {
            font-weight: 700;
            font-size: 1.5rem;
            margin: 0;
            color: var(--space-dark);
        }

        .brand-header span { color: var(--pets-blue); }

        /* Controles de Formulario */
        .form-label {
            font-size: 0.8rem;
            font-weight: 600;
            color: #718096;
            margin-left: 12px;
            margin-bottom: 5px;
        }

        .form-control, .form-select {
            border-radius: 15px;
            padding: 12px 20px;
            border: 2px solid #6cb4b4;
            background-color: #f7fffd;
            font-size: 0.9rem;
            margin-bottom: 15px;
            transition: 0.3s;
        }

        .form-control:focus, .form-select:focus {
            border-color: var(--pets-blue);
            box-shadow: 0 0 0 0.25rem rgba(0, 168, 255, 0.1);
        }

        /* Botón Principal */
        .btn-access {
            border-radius: 50px;
            padding: 14px;
            background: var(--cosmic-gradient);
            border: none;
            color: white;
            font-weight: 600;
            letter-spacing: 1px;
            margin-top: 10px;
            transition: 0.3s;
        }

        .btn-access:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 78, 146, 0.3);
            color: var(--universe-gold);
        }

        /* Footer del Login */
        .login-footer {
            margin-top: 30px;
            text-align: center;
            border-top: 1px solid #edf2f7;
            padding-top: 20px;
        }

        .create-account-link {
            color: var(--pets-blue);
            text-decoration: none;
            font-weight: 600;
            transition: 0.2s;
        }

        .create-account-link:hover {
            color: var(--space-dark);
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            .side-visual { display: none; }
            .login-container { max-width: 450px; }
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="side-visual">
        <img src="logo.png" alt="Logo Pets Universe">
        <h3 class="mt-4 fw-bold" style="color: var(--universe-gold);">¡Bienvenidos!</h3>
        <p class="small">"Amamos a los animales tanto como tú".</p>
    </div>

    <div class="side-form">
        <div class="brand-header">
            <img src="icono2.0.png" alt="Icono">
            <h2>Pets<span>Universe</span></h2>
        </div>

        <h5 class="mb-4 fw-bold">Iniciar Sesión</h5>

        <form>
            <label class="form-label">TIPO DE USUARIO</label>
            <select class="form-select" required>
                <option value="" selected disabled>Selecciona tu rol...</option>
                <option value="cliente">Cliente (Dueño de Mascota)</option>
                <option value="admin">Administrador</option>
                <option value="admin">Veterinario</option>
            </select>

            <label class="form-label">CORREO ELECTRÓNICO</label>
            <input type="email" class="form-control" placeholder="nombre@correo.com" required>

            <label class="form-label">CONTRASEÑA</label>
            <input type="password" class="form-control" placeholder="••••••••" required>

            <div class="text-end mb-3">
                <a href="#" class="small text-muted text-decoration-none">¿Olvidaste tu contraseña?</a>
            </div>

            <button type="submit" class="btn btn-access w-100">ENTRAR</button>
        </form>

        <div class="login-footer">
            <p class="small text-muted mb-0">¿Aun no tienes cuenta?</p>
            <a href="registro.html" class="create-account-link">Crear una cuenta nueva</a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
