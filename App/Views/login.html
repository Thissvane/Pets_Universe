<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pets Universe - Acceso al Sistema</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- Estilos propios -->
    <link rel="stylesheet" href="../../Public/css/styles.css">
</head>
<body class="page-auth">

<div class="login-container">

    <!-- PANEL VISUAL IZQUIERDO -->
    <div class="side-visual">
        <img src="../../Public/img//logo.png" alt="Logo Pets Universe">
        <h3 class="mt-4 fw-bold" style="color: var(--universe-gold);">¡Bienvenidos!</h3>
        <p class="small">"Amamos a los animales tanto como tú".</p>
    </div>

    <!-- FORMULARIO DERECHO -->
    <div class="side-form">
        <div class="brand-header">
            <img src="../../Public/img/icono2.0.png" alt="Icono">
            <h2>Pets<span>Universe</span></h2>
        </div>

        <h5 class="mb-4 fw-bold">Iniciar Sesión</h5>

        <form action="#" method="POST">
            <label class="form-label">TIPO DE USUARIO</label>
            <select name="tipo_usuario" class="form-select mb-3" required>
                <option value="" selected disabled>Selecciona tu rol...</option>
                <option value="cliente">Cliente (Dueño de Mascota)</option>
                <option value="admin">Administrador</option>
                <option value="veterinario">Veterinario</option>
            </select>

            <label class="form-label">CORREO ELECTRÓNICO</label>
            <input type="email" name="correo" class="form-control mb-3" placeholder="nombre@correo.com" required>

            <label class="form-label">CONTRASEÑA</label>
            <input type="password" name="clave" class="form-control mb-2" placeholder="••••••••" required>

            <div class="text-end mb-3">
                <a href="#" class="small text-muted text-decoration-none">¿Olvidaste tu contraseña?</a>
            </div>

            <button type="submit" class="btn btn-access w-100">ENTRAR</button>
        </form>

        <div class="login-footer">
            <p class="small text-muted mb-0">¿Aún no tienes cuenta?</p>
            <a href="registro.html" class="create-account-link">Crear una cuenta nueva</a>
        </div>
    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<!-- Scripts propios -->
<script src="../../Public/js/scripts.js"></script>
</body>
</html>
