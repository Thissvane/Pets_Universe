<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pets Universe - Registro de Usuario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --space-dark: #000b29;
            --pets-blue: #1adfbe;
            --universe-gold: #ffd700;
            --cosmic-gradient: linear-gradient(135deg, #000b29 0%, #0a0092 100%);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #080629a9;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
            background-size: 25px 25px;
        }

        .registration-card {
            max-width: 1000px;
            width: 100%;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            display: flex;
            box-shadow: 0 30px 60px rgba(0, 11, 41, 0.2);
        }

        /* LADO IZQUIERDO: Branding */
        .info-panel {
            flex: 0.8;
            background: var(--cosmic-gradient);
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            position: relative;
        }

        .info-panel img {
            width: 300px;
            margin-bottom: 25px;
            filter: drop-shadow(0 0 15px rgba(255, 215, 0, 0.3));
        }

        /* LADO DERECHO: Formulario */
        .form-panel {
            flex: 1.2;
            padding: 50px;
        }

        .brand-title {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }

        .brand-title img {
            width: 45px;
            margin-right: 15px;
        }

        .brand-title h2 {
            font-weight: 700;
            color: var(--space-dark);
            margin: 0;
        }

        .brand-title h2 span { color: var(--pets-blue); }

        /* Estilos de inputs */
        .form-label {
            font-size: 0.75rem;
            font-weight: 700;
            color: #64748b;
            text-transform: uppercase;
            margin-left: 5px;
        }

        .form-control, .form-select {
            border-radius: 12px;
            padding: 10px 18px;
            border: 2px solid #6cb4b4;
            background-color: #f7fffd;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .form-control:focus, .form-select:focus {
            border-color: var(--pets-blue);
            box-shadow: 0 0 0 4px rgba(0, 168, 255, 0.1);
            background-color: #fff;
        }

        /* Botón de Registro */
        .btn-register {
            border-radius: 50px;
            padding: 14px;
            background: var(--cosmic-gradient);
            border: none;
            color: white;
            font-weight: 600;
            letter-spacing: 1px;
            transition: 0.3s;
            margin-top: 15px;
        }

        .btn-register:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 78, 146, 0.3);
            color: var(--universe-gold);
        }

        .footer-link {
            text-align: center;
            margin-top: 25px;
            font-size: 0.9rem;
        }

        .footer-link a {
            color: var(--pets-blue);
            text-decoration: none;
            font-weight: 700;
        }

        @media (max-width: 850px) {
            .info-panel { display: none; }
            .form-panel { padding: 30px; }
        }
    </style>
</head>
<body>

    <div class="registration-card">
        <div class="info-panel">
            <img src="logo.png" alt="Pets Universe Logo">
            <h3 class="fw-bold" style="color: var(--universe-gold);">¡Únete a nosotros!</h3>
            <p class="opacity-75">Crea tu perfil y accede a un universo de cuidados para tus mascotas.</p>
        </div>

        <div class="form-panel">
            <div class="brand-title">
                <img src="icono2.0.png" alt="Icono">
                <h2>Pets<span>Universe</span></h2>
            </div>

            <p class="text-muted mb-4">Completa tus datos para registrarte en el sistema.</p>

            <form action="registro_proceso.php" method="POST" class="row g-3">
                
                <div class="col-12">
                    <label class="form-label">TIPO DE USUARIO</label>
                    <select name="tipo_usuario" class="form-select" required>
                        <option value="" selected disabled>Selecciona tu rol...</option>
                        <option value="cliente">Cliente (Dueño de Mascota)</option>
                        <option value="admin">Administrador</option>
                        <option value="admin">Veterinario</option>
                    </select>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Nombres</label>
                    <input type="text" name="nombres" class="form-control" placeholder="Ej: Carlos" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Apellidos</label>
                    <input type="text" name="apellidos" class="form-control" placeholder="Ej: lopez" required>
                </div>

                <div class="col-md-6">
                    <label class="form-label">TIPO DE DOCUMENTO</label>
                    <select name="tipo_documento" class="form-select" required>
                        <option value="" selected disabled>Selecciona tu documento...</option>
                        <option value="cc">Cédula de Ciudadanía</option>
                        <option value="ce">Cédula de Extranjería</option>
                        <option value="pasaporte">Pasaporte</option>
                        <option value="pep">Permiso Especial de Permanencia</option>
                        <option value="ppt"> Permiso por Protección Temporal</option>
                    </select>
                </div>

                <div class="col-md-6">
                    <label class="form-label">NÚMERO DE DOCUMENTO</label>
                    <input type="text" name="numero_documento" class="form-control"
                       placeholder="Ej: 1234567890" required
                       pattern="[0-9A-Za-z\-]{4,20}" title="Entre 4 y 20 caracteres">
                </div>

                <div class="col-md-6">
                    <label class="form-label">NÚMERO DE TELÉFONO</label>
                    <input type="text" name="numero_telefono" class="form-control" title="Deben de ser 10 caracteres">

                </div>

                <div class="col-12">
                    <label class="form-label">Correo Electrónico</label>
                    <input type="email" name="correo" class="form-control" placeholder="correo@espacial.com" required>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Contraseña</label>
                    <input type="password" name="clave" class="form-control" placeholder="••••••••" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Confirmar Contraseña</label>
                    <input type="password" name="clave_confirmar" class="form-control" placeholder="••••••••" required>
                </div>

                <div class="col-12">
                    <div class="form-check mt-2">
                        <input class="form-check-input" type="checkbox" id="terms" required>
                        <label class="form-check-label small text-muted" for="terms">
                            Acepto las políticas de privacidad de Pets Universe.
                        </label>
                    </div>
                </div>

                <div class="col-12">
                    <button type="submit" class="btn btn-register w-100">COMENZAR AVENTURA</button>
                </div>
            </form>

            <div class="footer-link">
                <p class="text-muted">¿Ya tienes una cuenta? <a href="login.html">Inicia sesión aquí</a></p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
